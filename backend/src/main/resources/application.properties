spring.application.name=recording-platform-backend
spring.jackson.deserialization.fail-on-unknown-properties=true
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/recording_platform}
spring.data.mongodb.auto-index-creation=true
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=105MB
recording.storage-dir=${RECORDING_STORAGE_DIR:backend/storage/recordings}
recording.web-session.idle-hours=${WEB_SESSION_IDLE_HOURS:12}
recording.web-session.cookie-secure=${WEB_SESSION_COOKIE_SECURE:false}
recording.miniprogram-session.days=${MINIPROGRAM_SESSION_DAYS:30}
recording.wechat.app-id=${WECHAT_APP_ID:}
recording.wechat.app-secret=${WECHAT_APP_SECRET:}
recording.initial-admin.username=${INITIAL_ADMIN_USERNAME:}
recording.initial-admin.password=${INITIAL_ADMIN_PASSWORD:}
